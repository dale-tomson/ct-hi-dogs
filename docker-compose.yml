services:
  api:
    env_file:
      - .env
    build:
      context: .
      args:
        VITE_API_KEY: ${VITE_API_KEY}
    ports:
      - "8080:8080"
    environment:
      PORT: "8080"
      API_KEY: ${API_KEY:-dev-secret}
      DB_PATH: "/data/dogs.db"
    volumes:
      - db_volume:/data

volumes:
  db_volume:
