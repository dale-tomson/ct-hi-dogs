services:
  - type: web
    name: dogs-api
    runtime: go
    buildCommand: >
      corepack enable pnpm &&
      cd frontend &&
      pnpm install --frozen-lockfile &&
      pnpm run build &&
      cd .. &&
      go build -o dogs-api .
    startCommand: ./dogs-api
    healthCheckPath: /api/health
    envVars:
      - key: PORT
        value: "10000"
      - key: DB_PATH
        value: /data/dogs.db
      - key: API_KEY
        generateValue: true     # Render generates a secure random string
      - key: VITE_API_KEY
        value: "${API_KEY}"     # Frontend uses the same secret from backend
    disk:
      name: dogs-db
      mountPath: /data
      sizeGB: 1
